<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> 宇宙餅乾保衛戰 </title>
</head>

<style type="text/css">
    .warp {
        width: 100%;
        height: 100%;
        padding: 30px 0 0 0;
    }
    *{
        margin: 15;
        padding: 0;
        list-style: none;
    }
    .con {
        width: 1040px;
        height: 640px;
        margin: auto;
        display: flex;
    }
    .con #box1{
        display: flex; /* 彈性排版 */
        flex-direction: column; /* 彈性方向:列(縱) */
        width: 240px;
        box-sizing: border-box;
        padding: 40px 30px 40px 40px;
        background-image: url(./img/bg_l.gif);
    }
    .con #box2{
        width: 640px;
        height: 640px;
        box-sizing: border-box;
        background-image: url(./img/bg_mid1-2.gif);
        position: relative;
        cursor: crosshair;
    }
    .con #box3{
        width: 160px;
        box-sizing: border-box;
        padding: 23px 50px 40px 15px;
        background-image: url(./img/bg_r1-2.gif);
    }
    .cookie {
        position: absolute;
    }
    #txtbox {
        height: 200px;
        text-align:left;
        padding: 0px 5px 0px 5px;
        
    }
    #txt {
        margin: 0;
        padding: 50px 60px 40px 60px;
        width: auto;
        height: auto;
    }
</style>

<script>
    let e1 = new Audio("./music/change.mp3");
    function button() {
        let bt = new Audio("./music/button.mp3");
        bt.play();
    }
    function boss_click() {
        let bc = new Audio("./music/boss.mp3");
        bc.play();
    }
    
    function init() {
        e1.play();
        document.getElementById("bosstext").innerHTML = "我就是本次任務的指揮官!";
        document.getElementById("boss").src = "./img/boss_h.gif";
        }
    
    let next = 0;
    function nextl() {
        next = next + 1;
        button();
            if (next  == 1){
                document.getElementById("txt").innerHTML = 
                    "你的任務很簡單<br>用準心對<d style='color: gold;'>吃太飽星人</d><br><d style='color: gold;'>點擊</d>就可以抓捕他們<br>必須將一個區域的吃太飽星人<br><d style='color: gold;'>全部抓完</d>才算完成任務<br><br>不過你的準心對脆脆的餅乾來說太硬<br>因此切記<d style='color: gold;'>不要碰到餅乾</d><br>不然他們會碎掉<br>";
            }
            if (next  == 2){
                document.getElementById("txt").innerHTML = "我們要去的第一個區域是<d style='color: palevioletred;'>空空銀河</d><br>那裡周遭比較平穩<br>吃太飽星人也入侵不多<br>很適合你這種新人來練習<br><br>做任務時請專心<br>一旦進入任務區域<br><d style='color: gold;'>就不要隨意離開任務區域</d><br>準備好就出發吧!";
            }
            if (next  == 3){
                location.href = "lv1.5.final.html";
            }
            
    }
    function re() {
        document.getElementById("next").src = "./img/next.png";
    }
    function chn() {
        document.getElementById("next").src = "./img/next2.png";
    }
    let msg = new Array(5);
    msg[0] = "嘿!專心點<br>別碰我";
    msg[1] = "夠了喔!<br>專心!";
    msg[2] = "別再碰我了";
    msg[3] = "你還有任務要執行吧!";
    msg[4] = "停下來!";
    function talk() {
        boss_click();
        let i = Math.floor(Math.random() * 5);
        console.log(i);
        document.getElementById("bosstext").innerHTML = msg[i];   
    }
</script>

<body onload="init()" style="background-color:#3F2749">
   
   <div class="warp">

        <div class="con">
            <div class="box" id="box1" align = "center">
                <font size="" face="微軟正黑體">
                    <h1 id="counter" style="color: orangered">
                    - -
                    </h1>
                </font>
                <h2 align = center style="color: white;position:relative;top:-3px;" > 
                   指揮官耐心度
                </h2>
                <div id="txtbox">
                   <h1 id="bosstext" style="color: white; position:relative;top:-10px;">
                      我就是本次任務的指揮官!
                  </h1>  
                </div>
                <img id="boss" src="./img/boss_h.gif" width="172"  style="position:relative;top:23px;" onclick="talk()">
                    
            </div>
            <div class="box" id="box2">
                <h1 margin = "0">
                   <p id="txt" style="color: white;line-height:1.5;">
                        歡迎來到<d style="color: gold">全宇宙最大的餅乾倉庫</d><br>
                        我是負監督你這次任務的水豚指揮官<br><br>
                        為了讓餅乾維持在最佳狀態<br>
                        我們把餅乾都存放在真空的宇宙中<br><br>
                        但最近有一群<d style="color: gold">吃太飽星人</d><br>
                        想要搶奪我們的餅乾<br>
                        <d style="color: gold">請保衛我們的餅乾吧</d><br>
                   </p>
                    
               </h1>
            </div>
            <div class="box" id="box3">                
                    <p align="center" id="here">
                        <img src="./img/next.png" type="button" id="next" onclick="nextl()" height="80px" onmouseenter="chn()" onmouseleave="re()">
                    </p>
                <font size="5.5" face="微軟正黑體">
                    <p align="right" style="position:relative;top:32px;left: 2px;padding:0px 6px 0px 6px; color: white
                   " id="score">
                    000    
                    </p>
                </font>
                <h3>
                    <p align="center" style="position:relative;top:40px; color: white
                   ">
                    你的業績    
                    </p>   
                </h3>
                                  
                <p>
                   <a href="https://www.instagram.com/pixel_moooooon/">
                       <img src="./img/png.png" width="96px" height="92px" style="position:relative;top:206px;left: 1px;">
                   </a>                    
                </p>
                
                <!--<audio controls autoplay loop style="display: none">
                    <source src="./music/game.mp3">
                </audio> -->
                
                      
            </div>
        </div>
   </div>
    
</body>
</html>
