<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> 宇宙餅乾 </title>
</head>

<style type="text/css">
    .warp {
        width: 100%;
        height: 100%;
        padding: 30px 0 0 0;
    }
    *{
        margin: 15;
        padding: 0;
        list-style: none;
    }
    .con {
        width: 1040px;
        height: 640px;
        margin: auto;
        display: flex;
    }
    .con #box1{
        display: flex; /* 彈性排版 */
        flex-direction: column; /* 彈性方向:列(縱) */
        width: 240px;
        box-sizing: border-box;
        padding: 40px 30px 40px 40px;
        background-image: url(./img/bg_l.gif);
    }
    .con #box2{
        width: 640px;
        height: 640px;
        box-sizing: border-box;
        background-image: url(./img/bg_mid2.gif);
        position: relative;
        cursor: crosshair;
    }
    .con #box3{
        width: 160px;
        box-sizing: border-box;
        padding: 23px 50px 40px 15px;
        background-image: url(./img/bg_r2.gif);
    }
    .cookie {
        position: absolute;
    }
    #txtbox {
        height: 200px;
        text-align:left;
        padding: 0px 5px 0px 5px;
        
    }
</style>

<script>
    let e1 = new Audio("./music/win.mp3");
    let e2 = new Audio("./music/magic.mp3");
    let e3 = new Audio("./music/failed.mp3");
    let eat2 = new Audio("./music/eat2.mp3");
    let eat3 = new Audio("./music/eat3.mp3");
    let eat4 = new Audio("./music/eat4.mp3");
    let eat5 = new Audio("./music/eat5.mp3");
    let eat6 = new Audio("./music/eat6.mp3");
    let bgm1 = new Audio("./music/bgm2.mp3");
    let bgmb = new Audio("./music/bgmB.mp3");
    let bgml = new Audio("./music/lose.mp3");
    
    bgmb.volume = 0.3;
    function button() {
        let bt = new Audio("./music/button.mp3");
        bt.play();
    }
    function boss_click() {
        let bc = new Audio("./music/boss.mp3");
        bc.play();
    }
    let cookies = new Object();
    let s = 0;
    let time = 25;
    function count() {
        time = time - 1;
        document.getElementById("counter").innerHTML = time.toString();
        if (time <= 0) {
            is_start = 0;
            clearInterval(tag1);
            clearInterval(tag2);
            clearInterval(tag3);
            bgm1.pause();
            bgmb.pause();
            bgml.play();
            document.getElementById("boss").src = "./img/boss_a.gif";
            document.getElementById("bosstext").innerHTML = "喂喂!<br>弄太久了吧";
            document.getElementById("re").style.display = "block";
            document.getElementById("go").style.display = "none";
            if (cboss >= 15) {
                document.getElementById("boss").src = "./img/w_b_a.gif";
            document.getElementById("bosstext").innerHTML = "喂喂!<br>弄太久了吧";
            }
        }
    }
    function init() {
        let x, y, x0, y0;
        let name;
        for (let i = 0; i <= 13; i++) {
            name = "c" + i.toString();
            x = Math.floor(Math.random()*(530 - 30) + 30);
            y = Math.floor(Math.random()*(510 - 50) + 50);
            x0 = Math.floor(Math.random()*(530 - 30) + 30);
            y0 = Math.floor(Math.random()*(510 - 50) + 50);
            /*time = 30;*/
            cookies[name] = { x:x, y:y, x0:x0, y0:y0 };
            document.getElementById(name).style.left = x.toString() + "px";
            document.getElementById(name).style.top = y.toString() + "px";
            }
        document.getElementById("re").style.display = "none";
        document.getElementById("go").style.display = "block";
        document.getElementById("bosstext").innerHTML = "讓我看看你的本領吧!";
        document.getElementById("boss").src = "./img/boss.gif";
        /*document.getElementById("counter").innerHTML = "30";*/
        clearInterval(tag2);
        clearInterval(tag3);
        is_start = 0;
        bgmb.currentTime = 0;
        bgm1.currentTime = 0;
        if (cboss >= 15) {
            document.getElementById("boss").src = "./img/w_b.gif";
            document.getElementById("bosstext").innerHTML = "我就用這個型態監督你";
        }
    }
    function change() {
        let name;
        for (let i = 0; i <= 13; i++) {
            name = "c" + i.toString();
            cookies[name].x = cookies[name].x + (cookies[name].x0-cookies[name].x)*0.2 + Math.floor(Math.random()*7 - 3);
            cookies[name].y = cookies[name].y + (cookies[name].y0-cookies[name].y)*0.2 + Math.floor(Math.random()*7 - 3);
            document.getElementById(name).style.left = cookies[name].x.toString() + "px";
            document.getElementById(name).style.top = cookies[name].y.toString() + "px";
        }
    }
    function next() {
        let name;
        for (let i = 0; i <= 13; i++) {
            name = "c" + i.toString();
            cookies[name].x0 = Math.floor(Math.random()*(530 - 30) + 30);
            cookies[name].y0 = Math.floor(Math.random()*(510 - 50) + 50);
        }
    }
    function nextl() {
            button();
            location.href = "lv2-3.html";
        if (score <= 0){
            location.href = "lv1.html";
        }
    }
    let tag1, tag2, tag3;
    let is_start = 0;
    function move() {
        if (is_start == 0) {
            button();
            is_start = 1;
            tag1 = setInterval(count, 1000);
            tag2 = setInterval(change, 40);
            tag3 = setInterval(next, 800);
            if (cboss < 15){
                bgm1.play();
            }
            if (cboss >= 15) {
                document.getElementById("boss").src = "./img/w_b_g.gif";
                document.getElementById("bosstext").innerHTML = "認真工作!<br>加油加油!";
                bgmb.play();
            }
        }
         else {
            window.alert("別按了!再按會嚇到餅乾!!!");
        }
        
    }
    /*
    function hit(obj) {
        obj.style.visibility = "hidden";
        s = s + 1;
        document.getElementById("score").innerHTML = s.toString();
        if (s == 6) {
            location.href = "p04-p05.html";
        }
    }
    */
    let score = 0;
    let ca = 0;
    function gameOver(obj){
        if( is_start )
        { 
            document.getElementById("score").innerHTML = score.toString();
            /*clearInterval(tag1);
            clearInterval(tag2);
            clearInterval(tag3);*/
            document.getElementById("boss").src = "./img/boss_a.gif";
            document.getElementById("bosstext").innerHTML = "搞什麼!<br>餅乾都被你撞碎了!";
            

            /*is_start = 0;*/

            if (obj.className == "cookie"){
                if (ca == 0){
                    score = score - 100;
                    document.getElementById("score").innerHTML = score.toString();
                    ca = 1;
                    document.getElementById(obj.id).src = "./img/"+obj.name+".gif";
                    let eat1 = new Audio("./music/"+obj.name+".mp3");
                    eat1.play();
                    let s = 1;
                        function go() {
                            s = s - 1;
                            if (s == 0) {
                                document.getElementById(obj.id).style.display = "none";
                                ca = 0;
                            }
                        }
                        setInterval(go, 150);
                
                }
                
            }     
            
            if (obj == box2){
                score = score - 100;
                document.getElementById("score").innerHTML = score.toString();
                clearInterval(tag1);
                clearInterval(tag2);
                clearInterval(tag3);
                is_start = 0;
                document.getElementById("re").style.display = "block";
                document.getElementById("go").style.display = "none";
                bgm1.pause();
                bgmb.pause();
                document.getElementById("bosstext").innerHTML = "不要分心!<br>快回去工作!";
            }
            if (cboss >= 15) {
                document.getElementById("boss").src = "./img/w_b_a.gif";
                document.getElementById("bosstext").innerHTML = "嘖!<br>還是廢柴一個...";
            }
        }
    }
    let is_win = 0;
    let win_point = 0;
    function win(obj) {
            if (is_start) {
            let nyah = new Audio("./music/nyah.mp3");
            nyah.play();
            document.getElementById(obj.id).style.display = "none";
            score = score + 500;
            document.getElementById("score").innerHTML = score.toString();
            win_point = win_point + 1;
                if (win_point == 2) {
                    document.getElementById("re").style.display = "none";
                document.getElementById("go").style.display = "none";
                document.getElementById("next").style.display = "block";
                clearInterval(tag1);
                clearInterval(tag2);
                clearInterval(tag3);
                is_start = 0;
                bgm1.pause();
                bgmb.pause();
                is_win = 1;
                    if (score >= 800){
                        e1.play();                    
                        document.getElementById("bosstext").innerHTML = "好耶!<br>快去下個區域吧!";
                        document.getElementById("boss").src = "./img/boss_h.gif";
                            if (cboss >= 15) {
                                document.getElementById("boss").src = "./img/w_b_h.gif";
                                document.getElementById("bosstext").innerHTML = "嘿!<br>我就知道你可以的!";
                        }
                    }
                    if (score < 800 && score > -100){
                        e3.play();
                        document.getElementById("bosstext").innerHTML = "我真的能放心把工作給交你嗎";
                        document.getElementById("boss").src = "./img/boss.gif";
                            if (cboss >= 15) {
                                document.getElementById("boss").src = "./img/w_b.gif";
                                document.getElementById("bosstext").innerHTML = "專心點好嗎...";
                        }
                    }
                    if (score <= -100){
                        bgml.play();
                        document.getElementById("bosstext").innerHTML = "撞碎太多!你被炒了!<br>重新再來!";
                        document.getElementById("boss").src = "./img/boss_a.gif";
                            if (cboss >= 15) {
                                document.getElementById("boss").src = "./img/w_b_a.gif";
                                document.getElementById("bosstext").innerHTML = "撞碎太多!你被炒了!<br>重新再來!";
                        }

                    }
                }
            
            
                
            }
            else {
                if (is_win) {
                    window.alert("都贏了...放過我吧");
                }
                else {
                    window.alert("碰我幹嘛!遊戲還沒開始");
                }
            }
    }
    function chg() {
        document.getElementById("go").src = "./img/go2.png";
        document.getElementById("re").src = "./img/re.png";
        document.getElementById("next").src = "./img/next.png";
    }
    function chr() {
        document.getElementById("go").src = "./img/go.png";
        document.getElementById("re").src = "./img/re2.png";
        document.getElementById("next").src = "./img/next.png";
    }
    function re() {
        document.getElementById("go").src = "./img/go.png";
        document.getElementById("re").src = "./img/re.png";
        document.getElementById("next").src = "./img/next.png";
    }
    function chn() {
        document.getElementById("go").src = "./img/go.png";
        document.getElementById("re").src = "./img/re.png";
        document.getElementById("next").src = "./img/next2.png";
    }
    let cboss = 0;
    let msg = new Array(5);
    msg[0] = "嘿!專心點<br>別碰我";
    msg[1] = "夠了喔!<br>專心!";
    msg[2] = "別再碰我了";
    msg[3] = "你還有任務要執行吧!";
    msg[4] = "停下來!";
    function talk() {
        boss_click();
        let i = Math.floor(Math.random() * 5);
        console.log(i);
        document.getElementById("bosstext").innerHTML = msg[i];
        cboss = cboss + 1;
        if (is_win == 0) {
            if (cboss == 15) {
                document.getElementById("boss").src = "./img/w_b.gif";
                document.getElementById("bosstext").innerHTML = "別碰了!<br>變這樣會比較認真嗎";
            }
            if (cboss == 15) {
                e2.play();
                bgmb.play();
                bgm1.pause();
            } 
            if (cboss == 50) {
                document.getElementById("boss").src = "./img/w_b_1.gif";
                document.getElementById("bosstext").innerHTML = "你看起來比較想玩別的遊戲";
            }            
        }
        
    }
</script>

<body onload="init()" style="background-color:#263422">
   
   <div class="warp">

        <div class="con">
            <div class="box" id="box1" align = "center">
                <font size="" face="微軟正黑體">
                    <h1 id="counter" style="color: orangered">
                    25
                    </h1>
                </font>
                <h2 align = center style="color: white;position:relative;top:-3px;" > 
                   指揮官耐心度
                </h2>
                <div id="txtbox">
                   <h1 id="bosstext" style="color: white; position:relative;top:-10px;">
                      讓我看看你的本領吧!
                  </h1>  
                </div>
                <img id="boss" src="./img/boss.gif" width="172"  style="position:relative;top:23px;" onclick="talk()">
                    
            </div>
            <div class="box" id="box2" onmouseleave="gameOver(this)">
                <img id="c0" src="./img/ca.gif" width="80" class="cookie" onclick="win(this)">
                <img id="c13" src="./img/ca2.gif" width="80" class="cookie" onclick="win(this)">
                <img id="c1" src="./img/c1.png" width="80" class="cookie" onmouseenter="gameOver(this)" name="c1">
                <img id="c2" src="./img/c2.png" width="64" class="cookie" onmouseenter="gameOver(this)" name="c2">
                <img id="c3" src="./img/c3.png" width="80" class="cookie" onmouseenter="gameOver(this)" name="c3">
                <img id="c4" src="./img/c4.png" width="80" class="cookie" onmouseenter="gameOver(this)" name="c4">
                <img id="c5" src="./img/c5.png" width="64" class="cookie" onmouseenter="gameOver(this)" name="c5">
                <img id="c6" src="./img/c6.png" width="80" class="cookie" onmouseenter="gameOver(this)" name="c6">
                <img id="c7" src="./img/c1.png" width="80" class="cookie" onmouseenter="gameOver(this)" name="c1">
                <img id="c8" src="./img/c2.png" width="64" class="cookie" onmouseenter="gameOver(this)" name="c2">
                <img id="c9" src="./img/c3.png" width="80" class="cookie" onmouseenter="gameOver(this)" name="c3">
                <img id="c10" src="./img/c4.png" width="80" class="cookie" onmouseenter="gameOver(this)" name="c4">
                <img id="c11" src="./img/c5.png" width="64" class="cookie" onmouseenter="gameOver(this)" name="c5">
                <img id="c12" src="./img/c6.png" width="80" class="cookie" onmouseenter="gameOver(this)" name="c6">
                
            </div>
            <div class="box" id="box3">
                <p align="center" id="here">
                    <img src="./img/go.png" type="button" id="go" onclick="move()" height="80px" onmouseenter="chg()" onmouseleave="re()">
                </p>
                <p align="center" id="here">
                    <img src="./img/re.png" type="button" id="re" onclick="init()" height="80px" onmouseenter="chr()" onmouseleave="re()" style="display: none">
                </p>
                
                    <p align="center" id="here">
                        <img src="./img/next.png" type="button" id="next" onclick="nextl()" height="80px" onmouseenter="chn()" onmouseleave="re()" style="display: none">
                    </p>
                <font size="5.5" face="微軟正黑體">
                    <p align="right" style="position:relative;top:35px;left: 2px;padding:0px 6px 0px 6px; color: white
                   " id="score">
                    000    
                    </p>
                </font>
                <h3>
                    <p align="center" style="position:relative;top:45px; color: white
                   ">
                    你的業績    
                    </p>   
                </h3>
                                  
                <p>
                   <a href="https://www.instagram.com/pixel_moooooon/">
                       <img src="./img/png.png" width="96px" height="92px" style="position:relative;top:206px;left: 1px;">
                   </a>                    
                </p>
                
                <!--<audio controls autoplay loop style="display: none">
                    <source src="./music/game.mp3">
                </audio> -->
                
                      
            </div>
        </div>
   </div>
    
</body>
</html>
