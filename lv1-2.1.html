<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> 宇宙餅乾 </title>
</head>

<style type="text/css">
    .warp {
        width: 100%;
        height: 100%;
        padding: 30px 0 0 0;
    }
    *{
        margin: 15;
        padding: 0;
        list-style: none;
    }
    .con {
        width: 1300px;
        height: 800px;
        margin: auto;
        display: flex;
    }
    .con #box1{
        display: flex; /* 彈性排版 */
        flex-direction: column; /* 彈性方向:列(縱) */
        width: 300px;
        box-sizing: border-box;
        padding: 50px 37.5px 50px 50px;
        background-image: url(./img/bg_l.gif);
        background-size:cover
    }
    .con #box2{
        width: 800px;
        height: 800px;
        box-sizing: border-box;
        background-image: url(./img/bg_mid1-2.gif);
        position: relative;
        cursor: crosshair;
        background-size:cover
    }
    .con #box3{
        width: 200px;
        box-sizing: border-box;
        padding: 33px 50px 40px 15px;
        background-image: url(./img/bg_r.gif);
        background-size:cover
    }
    .cookie {
        position: absolute;
    }
    #txtbox {
        height: 250px;
        text-align:left;
        padding: 0px 8px 0px 8px;
        
    }
</style>

<script>
    let bgm1 = new Audio("./music/change.mp3");
    function button() {
        let bt = new Audio("./music/button.mp3");
        bt.play();
    }
    function boss_click() {
        let bc = new Audio("./music/boss.mp3");
        bc.play();
    }
    function init() {
        bgm1.play();
        document.getElementById("bosstext").innerHTML = "下一關再重新拼業績!";
        document.getElementById("boss").src = "./img/boss_h.gif";        
    }
    function nextl() {
            button();
            location.href = "lv1-2.html";
        if (score <= 0){
            location.href = "lv1.html";
        }
    }
    let score = 0;


    function chg() {
        document.getElementById("go").src = "./img/go2.png";
        document.getElementById("re").src = "./img/re.png";
        document.getElementById("next").src = "./img/next.png";
    }
    function chr() {
        document.getElementById("go").src = "./img/go.png";
        document.getElementById("re").src = "./img/re2.png";
        document.getElementById("next").src = "./img/next.png";
    }
    function re() {
        document.getElementById("go").src = "./img/go.png";
        document.getElementById("re").src = "./img/re.png";
        document.getElementById("next").src = "./img/next.png";
    }
    function chn() {
        document.getElementById("go").src = "./img/go.png";
        document.getElementById("re").src = "./img/re.png";
        document.getElementById("next").src = "./img/next2.png";
    }
    let cboss = 0;
    let msg = new Array(5);
    msg[0] = "嘿!專心點<br>別碰我";
    msg[1] = "夠了喔!<br>專心!";
    msg[2] = "別再碰我了";
    msg[3] = "你還有任務要執行吧!";
    msg[4] = "停下來!";
    function talk() {
        boss_click();
        let i = Math.floor(Math.random() * 5);
        console.log(i);
        document.getElementById("bosstext").innerHTML = msg[i];        
        
    }
</script>

<body onload="init()" style="background-color:#3F2749">
   
   <div class="warp">

        <div class="con">
            <div class="box" id="box1" align = "center">
                <font size="4" face="微軟正黑體">
                    <h1 id="counter" style="color: orangered">
                    - -
                    </h1>
                </font>
                <h1 align = center style="color: white;position:relative;top:8px;" > 
                   指揮官耐心度
                </h1>
                <div id="txtbox">
                   <h1 id="bosstext" style="color: white; position:relative;top:10px;">
                      下一關再重新拼業績!
                  </h1>  
                </div>
                <img id="boss" src="./img/boss_h.gif" width="215"  style="position:relative;top:43.5px;" onclick="talk()">
                    
            </div>
            <div class="box" id="box2">
                
            </div>
            <div class="box" id="box3">
                <p align="center" id="here">
                    <img src="./img/go.png" type="button" id="go" onclick="move()" height="100px" onmouseenter="chg()" onmouseleave="re()"
                    style="display: none">
                </p>
                <p align="center" id="here">
                    <img src="./img/re.png" type="button" id="re" onclick="init()" height="100px" onmouseenter="chr()" onmouseleave="re()" style="display: none">
                </p>
                
                    <p align="center" id="here">
                        <img src="./img/next.png" type="button" id="next" onclick="nextl()" height="100px" onmouseenter="chn()" onmouseleave="re()">
                    </p>
                <font size="6" face="微軟正黑體">
                    <p align="right" style="position:relative;top:39px;right: 10px;padding:0px 6px 0px 6px; color: white
                   " id="score">
                    000    
                    </p>
                </font>
                <h2>
                    <p align="center" style="position:relative;top:45px;right: 3px; color: white
                   ">
                    你的業績    
                    </p>   
                </h2>
                                  
                <p>
                   <a href="https://www.instagram.com/pixel_moooooon/">
                       <img src="./img/png.png" width="120px" height="115px" style="position:relative;top:245px;left: 5px;">
                   </a>                    
                </p>
                
                <!--<audio controls autoplay loop style="display: none">
                    <source src="./music/game.mp3">
                </audio> -->
                
                      
            </div>
        </div>
   </div>
    
</body>
</html>
